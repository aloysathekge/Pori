# CD: Build and publish the `pori` kernel to PyPI on release (or manual dispatch).
# Uses PyPI Trusted Publishing (OIDC via id-token: write) — configure this repo +
# workflow as a Trusted Publisher on pypi.org; no API token secret needed.
name: Publish to PyPI

on:
  release:
    types: [published]
  # Optional: allow manual run from Actions tab
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    # Optional: add "environment: pypi" and store PYPI_API_TOKEN in that environment
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
