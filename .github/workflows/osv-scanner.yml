# OSV-Scanner: continuous CVE/malware signal against the lockfile.
# Detection-only (fail-on-vuln: false) — findings land in the Security tab and
# a weekly cron catches advisories published after a merge.
name: OSV-Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --lockfile=./uv.lock
      fail-on-vuln: false
