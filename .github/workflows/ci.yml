# CI: Lint, typecheck, and test on push and PRs
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra test

      - name: Black (format check)
        run: uv run black --check pori/ tests/

      - name: isort (import sort check)
        run: uv run isort --check-only pori/ tests/

      - name: mypy (type check)
        run: uv run mypy pori/ --ignore-missing-imports

      - name: Pytest
        run: uv run pytest tests/ -v --tb=short --cov=pori --cov-report=xml --cov-report=term-missing
        env:
          # Tests use mocks; no real API keys needed
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""

      - name: Upload coverage (for Codecov or similar)
        uses: actions/upload-artifact@v7
        if: success() && matrix.python-version == '3.12'
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  aloy-backend:
    name: Aloy backend (format + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/aloy/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install (editable pori + backend + dev extras)
        run: uv sync --extra dev

      - name: Black (format check)
        run: uv run black --check aloy_backend/ tests/

      - name: isort (import sort check)
        run: uv run isort --check-only aloy_backend/ tests/

      - name: Pytest
        run: uv run pytest tests/ -q --tb=short
        env:
          # Tests use mocks / monkeypatched keys; no real credentials needed.
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          GOOGLE_API_KEY: ""

  boundaries:
    name: Import boundaries (products -> pori, never upward)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install import-linter
        run: pip install import-linter
      - name: Enforce one-way dependency rule
        run: bash tools/ci/check-boundaries.sh

  dep-bounds:
    name: Dependency upper-bounds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Fail on unbounded '>=' dependencies
        run: python tools/ci/check_dep_bounds.py
