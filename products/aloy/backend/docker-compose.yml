# Invoke from products/aloy/backend/ inside the monorepo clone:
#   docker compose up -d --build
#
# The build context is the MONOREPO ROOT so the image sees the kernel
# (`pori/`, editable path dep) and the backend together.

services:
  api:
    build:
      context: ../../..
      dockerfile: products/aloy/backend/Dockerfile
    image: aloy-backend:latest
    container_name: aloy-backend-api
    restart: unless-stopped
    # Bind to loopback only — nginx terminates TLS and proxies in.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - /opt/aloy/.env
    volumes:
      # Durable data: blobs (STORAGE_BACKEND=local) + sandbox jails. Shared
      # with the worker so both write the same storage/workspaces.
      - aloy-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Durable run executor. Without this service, POST /v1/runs and the durable
  # send_message path enqueue runs that nothing ever executes. Leases are
  # DB-based (skip_locked on Postgres), so scale with --scale worker=N.
  worker:
    image: aloy-backend:latest
    container_name: aloy-backend-worker
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - /opt/aloy/.env
    volumes:
      - aloy-data:/data
    command: ["aloy-backend-worker"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Messaging gateway (Telegram). Only useful when TELEGRAM_BOT_TOKEN is set
  # in the env file; exits immediately otherwise, so enable with:
  #   docker compose --profile gateway up -d
  gateway:
    image: aloy-backend:latest
    container_name: aloy-backend-gateway
    restart: unless-stopped
    profiles: ["gateway"]
    depends_on:
      - api
    env_file:
      - /opt/aloy/.env
    command: ["aloy-backend-gateway"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  aloy-data:
