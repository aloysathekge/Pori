# Invoke from /opt/pori-cloud/pori_cloud/ on the EC2 instance:
#   docker compose up -d --build
#
# The build context is the parent dir so the image can see both
# `Pori/` (the framework, editable path dep) and `pori_cloud/` (the API).

services:
  api:
    build:
      context: ..
      dockerfile: pori_cloud/Dockerfile
    image: pori-cloud:latest
    container_name: pori-cloud-api
    restart: unless-stopped
    # Bind to loopback only — nginx terminates TLS and proxies in.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - /opt/pori-cloud/.env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
