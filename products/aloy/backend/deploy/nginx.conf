# /etc/nginx/sites-available/api.pori.aloysathekge.com
# Symlink into /etc/nginx/sites-enabled/ and reload nginx.
#
# Pre-TLS, only the port-80 block is active. After certbot issues a cert the
# commented 443 block is swapped in (certbot --nginx edits this file in place,
# or you can copy it over manually — see RUNBOOK).

server {
    listen 80;
    listen [::]:80;
    server_name api.pori.aloysathekge.com;

    # Certbot HTTP-01 challenge path (fine to leave after migration too).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Before TLS is issued: proxy directly. After TLS: certbot rewrites this
    # to a 301 → https. Keeping the proxy here lets the health check work
    # during initial bring-up.
    # Durable uploads go up to 100MB (backend-enforced); nginx default is 1m.
    client_max_body_size 120m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        # SSE streaming endpoints
        proxy_buffering        off;
        proxy_read_timeout     300s;
        proxy_set_header       X-Accel-Buffering no;
    }
}

# After `sudo certbot --nginx -d api.pori.aloysathekge.com` runs, it will
# inject the 443 server block and a 301 redirect in the port-80 block
# automatically. No manual TLS config required.
