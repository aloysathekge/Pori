<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/aloy-icon.svg" />
    <meta name="description" content="Aloy — your personal AI agent. It remembers what matters to you and shows every step of its work." />
    <meta name="theme-color" content="#0F8571" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Aloy</title>
    <script>
      // Resolve the theme BEFORE first paint so there's no flash of the wrong
      // one. Stored choice wins; otherwise follow the OS. Mirrors useTheme.
      (function () {
        try {
          var stored = localStorage.getItem('aloy.theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.dataset.theme =
            stored || (prefersDark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
