# Pori Agent Configuration Example
# Copy this file to config.yaml and customize for your needs
# API keys should be stored in .env file, not here

llm:
  # Provider: anthropic, openai, google, or azure
  provider: anthropic
  
  # Model name (provider-specific)
  # Anthropic: claude-sonnet-4-5-20250929, claude-3-5-sonnet-20241022, claude-3-opus-20240229
  # OpenAI: gpt-4o, gpt-4-turbo, gpt-4, gpt-3.5-turbo
  # Google: gemini-pro, gemini-1.5-pro, gemini-1.5-flash
  model: claude-sonnet-4-5-20250929
  
  # Temperature (0.0 - 2.0): lower = more deterministic, higher = more creative
  temperature: 0.0
  
  # Max tokens to generate (optional)
  # max_tokens: 4096
  
  # Top-p sampling (optional, 0.0 - 1.0)
  # top_p: 1.0
  
  # Extra provider-specific parameters (optional)
  # extra_params:
  #   stop_sequences: ["\n\nHuman:"]
  #   top_k: 40

agent:
  # Maximum steps the agent can take per task
  max_steps: 10
  
  # Enable memory system
  enable_memory: true
  # Approximate token budget used for conversation window
  context_window_tokens: 3000
  # Tokens reserved for system prompt, planning context, and tool outputs
  context_window_reserve_tokens: 1200

memory:
  # memory (ephemeral) or sqlite (persistent)
  backend: memory
  # Used when backend=sqlite
  # sqlite_path: .pori/memory.db
  user_id: default_user
  agent_id: default_agent
  # Optional stable session id. If omitted, a new session id is generated.
  # session_id: session_main

# Prompts: override where prompt templates are loaded from (optional)
# prompts:
#   base_dir: ./prompts

# Sandbox: isolated shell and file environment per task (optional)
# sandbox:
#   enabled: true
#   base_dir: .pori_sandbox   # or e.g. /tmp/pori_sandbox

# Human-in-the-Loop: require approval before executing certain tools
# hitl:
#   enabled: true
#   interrupt_on:
#     bash: true                          # All decisions allowed (approve/edit/reject)
#     write_file: true
#     sandbox_write_file: true
#     execute_sql:                        # Fine-grained control
#       allowed_decisions: [approve, reject]  # No editing allowed
#     read_file: false                    # Safe: no approval needed (default if not listed)
#   auto_approve_duplicates: true         # Skip re-asking for identical approved calls
#   timeout_seconds: 300                  # Wait time for human response

