# Pori Agent Configuration Example
# Copy this file to config.yaml and customize for your needs
# API keys should be stored in .env file, not here

llm:
  # Provider: anthropic, openai, google, azure, openrouter, or fireworks
  provider: anthropic

  # Model name (provider-specific)
  # Anthropic: claude-sonnet-4-5-20250929, claude-3-5-sonnet-20241022, claude-3-opus-20240229
  # OpenAI: gpt-4o, gpt-4-turbo, gpt-4, gpt-3.5-turbo
  # Google: gemini-pro, gemini-1.5-pro, gemini-1.5-flash
  # OpenRouter: meta-llama/llama-3.3-70b-instruct, mistralai/mistral-nemo, qwen/qwen-2.5-72b-instruct,
  #             deepseek/deepseek-chat, google/gemma-2-27b-it, openai/gpt-4o-mini
  model: claude-sonnet-4-5-20250929

  # Optional: model tiers for sub-agent delegation (model-per-agent).
  # A specialist in .pori/agents/*.md can declare `model: fast` (or balanced/
  # powerful); it resolves to the concrete model mapped here FOR THIS PROVIDER,
  # so the same specialist file is portable across providers. Omit `tiers`
  # entirely (e.g. a single local OSS model) and every sub-agent just inherits
  # the default `model` above. An unmapped tier also inherits.
  # tiers:
  #   fast: claude-haiku-4-5          # Anthropic
  #   powerful: claude-opus-4-8
  #   # OpenAI:      fast: gpt-5-mini      powerful: gpt-5
  #   # OSS (OpenRouter): fast: qwen/qwen-2.5-7b-instruct   powerful: deepseek/deepseek-r1

  # Temperature (0.0 - 2.0): lower = more deterministic, higher = more creative
  temperature: 0.0
  
  # Max tokens to generate (optional)
  # max_tokens: 4096
  
  # Top-p sampling (optional, 0.0 - 1.0)
  # top_p: 1.0
  
  # Extra provider-specific parameters (optional)
  # extra_params:
  #   stop_sequences: ["\n\nHuman:"]
  #   top_k: 40

agent:
  # Maximum steps the agent can take per task
  max_steps: 10
  
  # Enable memory system
  enable_memory: true
  # When true (default), the conversation-history budget is sized to the model's
  # real context length (e.g. ~200K for Claude, ~1M for Gemini) so large-context
  # models use their capacity and compression only fires on genuine overflow.
  # Set false to use context_window_tokens below as a hard cap.
  context_window_auto: true
  # Hard cap on the conversation-history token budget, used only when
  # context_window_auto is false.
  context_window_tokens: 3000
  # Tokens reserved for system prompt, planning context, and tool outputs
  context_window_reserve_tokens: 1200
  # AC-3: summarize context that would overflow the window with an aux LLM call
  # before it is dropped (instead of the cheap deterministic stub). Adds an
  # occasional auxiliary call on overflow; off by default.
  compress_context: false
  # AC-5: detect cross-step tool loops (a call failing repeatedly, or an
  # idempotent read returning the same result) and nudge/halt. Only fires on a
  # detected loop; on by default.
  tool_loop_guardrail: true
  # When true, an LLM judges each proposed final answer; inadequate answers are
  # rejected and the agent must revise (empty answers are always rejected).
  validate_output: false
  # Max answer rejections by output validation before accepting anyway.
  max_validation_retries: 2

memory:
  # sqlite (persistent — the default, so sessions survive restarts and
  # interrupted runs can resume) or memory (ephemeral)
  backend: sqlite
  # Used when backend=sqlite (defaults to .pori/memory.db)
  # sqlite_path: .pori/memory.db
  user_id: default_user
  agent_id: default_agent
  # Optional stable session id. If omitted, a new session id is generated.
  # session_id: session_main

# Prompts: override where prompt templates are loaded from (optional)
# prompts:
#   base_dir: ./prompts

# Skills: local progressive skills loaded from SKILL.md files (optional)
# skills:
#   enabled: true
#   default_dir: ./.pori/skills
#   directories: []
#   external_dirs:
#     - ~/pori-skills
#   disabled:
#     - old-skill
#   config:
#     github:
#       default_owner: aloysathekge
#   max_instruction_chars: 50000
#   skill_limit: 3
#   # SK-1 layer 2: after each run, fire a cheap non-blocking review agent that
#   # may autonomously author a skill from the finished session. Off by default.
#   background_review: false

# Evolution: governed self-evolution proposal state (optional)
# evolution:
#   enabled: true
#   path: ./.pori/evolution.json

# Sandbox: isolated shell and file environment per task (optional)
# sandbox:
#   enabled: true
#   base_dir: .pori_sandbox   # or e.g. /tmp/pori_sandbox
#   # Execution backend: local (host, cooperative) or e2b (cloud microVM,
#   # true isolation). e2b needs E2B_API_KEY and: pip install 'pori[sandbox-e2b]'
#   backend: local

# Human-in-the-Loop: require approval before executing certain tools
# hitl:
#   enabled: true
#   interrupt_on:
#     bash: true                          # All decisions allowed (approve/edit/reject)
#     write_file: true
#     sandbox_write_file: true
#     execute_sql:                        # Fine-grained control
#       allowed_decisions: [approve, reject]  # No editing allowed
#     read_file: false                    # Safe: no approval needed (default if not listed)
#   auto_approve_duplicates: true         # Skip re-asking for identical approved calls
#   timeout_seconds: 300                  # Wait time for human response

# Team: multi-agent coordination with LLM-powered routing (optional)
# team:
#   name: research-team
#   mode: router                             # router, broadcast, or delegate
#   coordinator_llm:                         # LLM for routing/planning decisions
#     provider: anthropic
#     model: claude-sonnet-4-5-20250929
#     temperature: 0.0
#   max_delegation_steps: 10
#   max_concurrent_members: 5
#   members:
#     - name: researcher
#       description: "Searches the web and gathers information"
#       tools: [search, answer, done]
#     - name: analyst
#       description: "Analyses data and writes reports"
#       tools: [answer, done]
#       agent_settings:
#         max_steps: 15
#     - name: sub-team                       # Nested team as a member
#       description: "A sub-team for complex analysis"
#       team_config:
#         name: analysis-sub-team
#         mode: broadcast
#         members:
#           - name: statistician
#             description: "Runs statistical analysis"
#           - name: writer
#             description: "Writes summaries"

# ============================================
# Example configurations for different providers:
# ============================================

# OpenAI configuration:
# llm:
#   provider: openai
#   model: gpt-4o
#   temperature: 0.7
#   max_tokens: 2048

# Google configuration:
# llm:
#   provider: google
#   model: gemini-1.5-pro
#   temperature: 0.5

# Azure OpenAI configuration:
# llm:
#   provider: azure
#   model: gpt-4
#   temperature: 0.0

# Fireworks AI configuration (OpenAI-compatible endpoint hosting open + partner models):
# Set FIREWORKS_API_KEY in .env. Optionally override FIREWORKS_BASE_URL.
# Model slugs follow the "accounts/<account>/models/<model>" format.
# llm:
#   provider: fireworks
#   model: accounts/fireworks/models/kimi-k2p6
#   temperature: 0.6
#   max_tokens: 4096
#   extra_params:
#     top_p: 1
#     top_k: 40
#     presence_penalty: 0
#     frequency_penalty: 0

# OpenRouter configuration (access OSS + hosted models via one API):
# Set OPENROUTER_API_KEY in .env. Optional: OPENROUTER_HTTP_REFERER and
# OPENROUTER_X_TITLE for attribution on openrouter.ai/rankings.
# Model names use the "vendor/model" slug from https://openrouter.ai/models
#
# Tip: set `model: select` to get an interactive model picker at startup,
# backed by the curated catalog in pori/llm/openrouter_models.py.
# You can also set PORI_SELECT_MODEL=1 to force the picker regardless of
# what's configured.
# llm:
#   provider: openrouter
#   model: select                                  # or e.g. meta-llama/llama-3.3-70b-instruct
#   temperature: 0.2
#   max_tokens: 4096
