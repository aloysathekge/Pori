# Pori/Aloy monorepo — dependency-boundary contract (import-linter)
#
# STATUS: STAGED / INERT until the Phase 4 package migration.
# The kernel currently lives at repo-root `pori/`; the `ext` and `products`
# packages below do not exist yet, so `lint-imports` will report missing
# packages if run now. Enable in CI once the packages exist.
#
# Rule enforced: products -> ext -> pori, never upward.
# `pori` (kernel) may import NOTHING from ext/products.

[importlinter]
root_packages =
    pori
    aloy
# Add ext packages here as they are created, e.g.:
#     pori_memory
#     pori_skills
#     pori_gateway

[importlinter:contract:bands]
name = Band layering (products -> ext -> pori)
type = layers
# Highest layer first. A layer may import lower layers but never higher ones.
layers =
    aloy
    pori

# When ext packages exist, insert them between `aloy` and `pori`, e.g.:
# layers =
#     aloy
#     pori_memory | pori_skills | pori_gateway
#     pori

[importlinter:contract:kernel-purity]
name = Kernel imports nothing upward
type = forbidden
source_modules =
    pori
forbidden_modules =
    aloy
# Add ext modules to forbidden_modules too once they exist.
