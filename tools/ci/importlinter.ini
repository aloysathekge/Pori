# Pori/Aloy monorepo — dependency-boundary contract (import-linter)
#
# STATUS: ACTIVE. Enforced in CI (.github/workflows/ci.yml, `boundaries` job)
# and runnable locally via tools/ci/check-boundaries.sh.
#
# Layout this contract targets (the real one):
#   pori/                          KERNEL — repo-root package
#   products/aloy/backend/aloy_backend/   Aloy product backend
#
# Rule enforced: products -> (extensions) -> pori, never upward.
# `pori` (kernel) may import NOTHING from products.
#
# `aloy_backend` must be findable on PYTHONPATH (products/aloy/backend) —
# check-boundaries.sh and the CI job both set this up.

[importlinter]
root_packages =
    pori
    aloy_backend
# Add extension packages here as they are created under extensions/, e.g.:
#     pori_memory
#     pori_skills

[importlinter:contract:bands]
name = Band layering (products -> extensions -> pori)
type = layers
# Highest layer first. A layer may import lower layers but never higher ones.
layers =
    aloy_backend
    pori

# When extension packages exist, insert them between `aloy_backend` and `pori`:
# layers =
#     aloy_backend
#     pori_memory | pori_skills
#     pori

[importlinter:contract:kernel-purity]
name = Kernel imports nothing upward
type = forbidden
source_modules =
    pori
forbidden_modules =
    aloy_backend
# Add extension modules to forbidden_modules too once they exist.

[importlinter:contract:front-door-only]
name = Product uses only the kernel front door (no deep imports)
type = forbidden
source_modules =
    aloy_backend
forbidden_modules =
    pori.agent
    pori.team
    pori.tools
    pori.llm
    pori.config
    pori.utils
    pori.observability
    pori.clarify
    pori.mcp
    pori.sandbox
    pori.providers
    pori.hitl
    pori.memory
    pori.orchestrator
    pori.eval
# Direct submodule imports only — `from pori import X` is the supported surface.
# (pori/__init__ itself imports these internally; that indirect chain is fine.)
allow_indirect_imports = True
# Everything a product needs is exported from pori/__init__ (see the
# "Product integration seams" block there). If a product needs a symbol the
# front door lacks, EXPORT it — don't punch through.
